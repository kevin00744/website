services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cms_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    environment:
      - APP_ENV=${APP_ENV:-local}
    depends_on:
      - db
      - redis
    networks:
      - cms_network

  nginx:
    image: nginx:alpine
    container_name: cms_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - cms_network

  db:
    image: postgres:16-alpine
    container_name: cms_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-cms}
      POSTGRES_USER: ${DB_USERNAME:-cms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cms_network

  redis:
    image: redis:7-alpine
    container_name: cms_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - cms_network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cms_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work --sleep=3 --tries=3
    depends_on:
      - db
      - redis
    networks:
      - cms_network

volumes:
  db_data:
  redis_data:

networks:
  cms_network:
    driver: bridge
